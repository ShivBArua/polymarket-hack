<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark circle background -->
  <circle cx="32" cy="32" r="31" fill="#060E1E"/>

  <!-- Outer blue arc (top-right sweep) -->
  <path d="M 32 3 A 29 29 0 0 1 61 32 A 29 29 0 0 1 50 55" stroke="url(#blueArc)" stroke-width="4.5" fill="none" stroke-linecap="round"/>

  <!-- Orange-gold inner arc (bottom-left sweep) -->
  <path d="M 46 59 A 29 29 0 0 1 3 32 A 29 29 0 0 1 15 10" stroke="url(#orangeArc)" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Neural-network dots (left side) -->
  <circle cx="16" cy="26" r="2" fill="#60A5FA"/>
  <circle cx="16" cy="38" r="2" fill="#60A5FA"/>
  <circle cx="24" cy="32" r="2" fill="#93C5FD"/>
  <line x1="16" y1="26" x2="24" y2="32" stroke="#3B82F6" stroke-width="0.8" opacity="0.7"/>
  <line x1="16" y1="38" x2="24" y2="32" stroke="#3B82F6" stroke-width="0.8" opacity="0.7"/>

  <!-- Candlestick bars -->
  <!-- Green candle 1 -->
  <line x1="29" y1="20" x2="29" y2="24" stroke="#22C55E" stroke-width="1.2"/>
  <rect x="26.5" y="24" width="5" height="13" rx="0.5" fill="#22C55E"/>
  <line x1="29" y1="37" x2="29" y2="42" stroke="#22C55E" stroke-width="1.2"/>

  <!-- Green candle 2 (shorter) -->
  <line x1="36" y1="26" x2="36" y2="29" stroke="#22C55E" stroke-width="1.2"/>
  <rect x="33.5" y="29" width="5" height="9" rx="0.5" fill="#22C55E"/>
  <line x1="36" y1="38" x2="36" y2="41" stroke="#22C55E" stroke-width="1.2"/>

  <!-- Red/orange candle 3 -->
  <line x1="43" y1="21" x2="43" y2="25" stroke="#F97316" stroke-width="1.2"/>
  <rect x="40.5" y="25" width="5" height="14" rx="0.5" fill="#F97316"/>
  <line x1="43" y1="39" x2="43" y2="44" stroke="#F97316" stroke-width="1.2"/>

  <!-- Star / flare at top -->
  <circle cx="37" cy="14" r="2.5" fill="#FDE68A" opacity="0.95"/>
  <line x1="37" y1="9" x2="37" y2="11" stroke="#FDE68A" stroke-width="1.5" opacity="0.8"/>
  <line x1="37" y1="17" x2="37" y2="19" stroke="#FDE68A" stroke-width="1.5" opacity="0.8"/>
  <line x1="32" y1="14" x2="34" y2="14" stroke="#FDE68A" stroke-width="1.5" opacity="0.8"/>
  <line x1="40" y1="14" x2="42" y2="14" stroke="#FDE68A" stroke-width="1.5" opacity="0.8"/>
  <line x1="33.5" y1="10.5" x2="35" y2="12" stroke="#FDE68A" stroke-width="1" opacity="0.6"/>
  <line x1="39" y1="16" x2="40.5" y2="17.5" stroke="#FDE68A" stroke-width="1" opacity="0.6"/>

  <defs>
    <linearGradient id="blueArc" x1="32" y1="3" x2="61" y2="55" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="orangeArc" x1="46" y1="59" x2="15" y2="10" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
  </defs>
</svg>
